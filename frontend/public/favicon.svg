<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Prato/Comanda -->
  <circle cx="50" cy="50" r="45" fill="#f5f5f5" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Padrão de linhas (representando comanda) -->
  <line x1="20" y1="35" x2="80" y2="35" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="20" y1="42" x2="80" y2="42" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="20" y1="49" x2="80" y2="49" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="20" y1="56" x2="80" y2="56" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="20" y1="63" x2="80" y2="63" stroke="#1e293b" stroke-width="1.5"/>
  
  <!-- Garfo e faca -->
  <!-- Garfo esquerdo -->
  <g transform="translate(30, 75)">
    <line x1="0" y1="0" x2="0" y2="-15" stroke="#1e293b" stroke-width="1.5"/>
    <line x1="-4" y1="-8" x2="-4" y2="-15" stroke="#1e293b" stroke-width="1.5"/>
    <line x1="0" y1="-8" x2="0" y2="-15" stroke="#1e293b" stroke-width="1.5"/>
    <line x1="4" y1="-8" x2="4" y2="-15" stroke="#1e293b" stroke-width="1.5"/>
  </g>
  
  <!-- Faca direita -->
  <g transform="translate(70, 75)">
    <line x1="0" y1="0" x2="0" y2="-15" stroke="#1e293b" stroke-width="1.5"/>
    <polygon points="0,-8 3,-15 -3,-15" fill="#1e293b"/>
  </g>
</svg>